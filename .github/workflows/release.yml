name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Build client binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.Version=$VERSION"
          
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/ogrok-linux-amd64 ./cmd/client/
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/ogrok-linux-arm64 ./cmd/client/
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/ogrok-darwin-amd64 ./cmd/client/
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/ogrok-darwin-arm64 ./cmd/client/
          
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/ogrok-server-linux-amd64 ./cmd/server/
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/ogrok-server-linux-arm64 ./cmd/server/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ogrok-linux-amd64
            dist/ogrok-linux-arm64
            dist/ogrok-darwin-amd64
            dist/ogrok-darwin-arm64
            dist/ogrok-server-linux-amd64
            dist/ogrok-server-linux-arm64